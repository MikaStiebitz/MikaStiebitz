name: Update Sponsors

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Update sponsors section
        uses: JamesIves/github-sponsors-readme-action@v1.6.0
        with:
          token: ${{ secrets.SPONSORS_TOKEN || github.token }}
          file: README.md
          marker: sponsors
